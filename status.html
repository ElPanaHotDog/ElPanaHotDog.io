<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>Status of Players who play with My Mods</title>

<style>
body {
    margin: 0;
    min-height: 100vh;

    font-family: 'Asap', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);

    cursor: url("cursor.png"), auto;
    position: relative;

    padding: 30px;
    box-sizing: border-box;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;

    background-image: url("S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    animation: move 20s linear infinite;

    z-index: 1;
    pointer-events: none;
}

@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

.page {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    font-family: 'Titan One', sans-serif;
    font-size: 48px;
    margin: 0 0 20px;
    text-align: center;
}

.status-box {
    background: rgba(0, 0, 0, 0.35);
    border: 3px solid rgba(255, 255, 255, 0.35);
    border-radius: 14px;
    padding: 20px;
    min-height: 260px;
}

#status {
    margin: 0;
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.5;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.badge {
    background: #00d4ff;
    color: #111;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 700;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("cursor.png"), auto;
    transition: 0.2s;

    background: #ffd400;
    color: black;
}

button:hover {
    transform: scale(1.08);
}

.error {
    color: #ffdddd;
}

@media (max-width: 600px) {
    body {
        padding: 18px;
    }

    h1 {
        font-size: 36px;
    }

    #status {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="page">
    <h1>Player Status</h1>

    <div class="topbar">
        <button onclick="location.href='index.html'">Back</button>
        <div class="badge" id="lastUpdate">Updating...</div>
    </div>

    <div class="status-box">
        <pre id="status">Loading players...</pre>
    </div>
</div>

<script>
const SUPABASE_URL =
    "https://efxhckhfjdzsxoiyeaja.supabase.co/rest/v1/players";

const API_KEY =
    "sb_publishable_tCwErLmpATHsqVCX1jsfqg_ZBYlWY-x";

async function updateStatus() {
    const status = document.getElementById("status");
    const lastUpdate = document.getElementById("lastUpdate");

    try {
        const res = await fetch(SUPABASE_URL, {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        });

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        const nowUnix = Math.floor(Date.now() / 1000);

        const activePlayers = data.filter(
            p => nowUnix - (p.updatedat || 0) <= 30
        );

        if (activePlayers.length === 0) {
            status.textContent = "No players are online";
        } else {
            status.textContent = activePlayers.map(p =>
                `${p.playername || "Unknown"} | ${p.location || "unknown"} | ${p.category || "unknown"} | ${p.roundid || "unknown"}`
            ).join("\n");
        }

        status.classList.remove("error");

        const now = new Date();
        lastUpdate.textContent =
            "Updated:" +
            now.toLocaleTimeString();

    } catch (e) {
        status.classList.add("error");
        status.textContent =
            "The status could not be loaded from Supabase.";

        lastUpdate.textContent = "Error";

        console.error(e);
    }
}

updateStatus();

setInterval(updateStatus, 5000);
</script>

</body>
</html>
