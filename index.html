<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuente Titan One -->
<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Titan One', sans-serif;
    color: white;

    /* Fondo degradado */
    background: linear-gradient(to bottom, #ff6a00, #ff3cac);

    overflow: hidden;
    position: relative;
}

/* Patrón S12_Pattern desde tu repo */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    pointer-events: none;
}

/* Contenedor principal */
.container {
    position: relative;
    z-index: 1;
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

/* Botones */
.buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Titan One', sans-serif;
    font-size: 18px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* Colores */
.github { background: #24292e; color: white; }
.youtube { background: #ff0000; color: white; }
.x { background: #000000; color: white; }
</style>
</head>

<body>

<div class="container">
    <h1>I'm El Pana Hot Dog</h1>

    <div class="buttons">
        <button class="github" onclick="window.open('https://github.com/ElPanaHotDog', '_blank')">GitHub</button>
        <button class="youtube" onclick="window.open('https://youtube.com/', '_blank')">YouTube</button>
        <button class="x" onclick="window.open('https://x.com/', '_blank')">X</button>
    </div>
</div>

</body>
</html>
