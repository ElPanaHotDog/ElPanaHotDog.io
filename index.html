<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: 'Titan One', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);

    cursor: url("cursor.png"), auto;
    position: relative;
}

/* =========================
   🧠 CAPA 1: PATRÓN (FONDO)
========================= */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;

    animation: move 20s linear infinite;

    z-index: 1;
    pointer-events: none;
}

@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

/* =========================
   🧠 CAPA 2: BIG (DEBAJO UI)
========================= */
.big-layer {
    position: absolute;
    top: 40%;
    left: 55%;
    transform: translate(-50%, -50%);

    width: 320px;

    z-index: 2;
    pointer-events: none;
}

/* =========================
   🧠 CAPA 3: UI (ARRIBA TODO)
========================= */
.ui {
    position: relative;
    z-index: 3;
    text-align: center;
}

h1 {
    font-size: 60px;
}

/* BOTONES */
.buttons {
    display: flex;
    gap: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("cursor.png"), auto;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* COLORES CORRECTOS */
.github { background: #2b2f36; color: white; }
.youtube { background: #ff0000; color: white; }
.portfolio { background: #ffd400; color: black; }
.x { background: #000000; color: white; }
</style>
</head>

<body>

<!-- BIG (entre patrón y UI) -->
<img class="big-layer" src="big.png">

<!-- UI -->
<div class="ui">

<h1>I'm El Pana Hot Dog</h1>

<div class="buttons">
    <button class="github" onmouseenter="hover()" onclick="openLink('https://github.com')">GitHub</button>
    <button class="youtube" onmouseenter="hover()" onclick="openLink('https://youtube.com')">YouTube</button>
    <button class="portfolio" onmouseenter="hover()" onclick="goPortfolio()">Portfolio</button>
    <button class="x" onmouseenter="hover()" onclick="openLink('https://x.com')">X</button>
</div>

</div>

<!-- 🔊 AUDIO SYSTEM LIMPIO -->
<audio id="music" src="FallinFriends.mp3" loop></audio>
<audio id="hoverS" src="PopUp.wav"></audio>
<audio id="clickS" src="Accept.wav"></audio>
<audio id="portfolioS" src="Confeti.wav"></audio>

<script>

/* =========================
   🔊 AUDIO MANAGER ÚNICO
========================= */
const music = document.getElementById("music");
const hoverS = document.getElementById("hoverS");
const clickS = document.getElementById("clickS");
const portfolioS = document.getElementById("portfolioS");

let started = false;

function startAudio(){
    if(!started){
        music.volume = 0.12; // HOME
        music.play().catch(()=>{});
        started = true;
    }
}

document.addEventListener("click", startAudio);
document.addEventListener("mousemove", startAudio);
document.addEventListener("keydown", startAudio);

function play(s){
    s.currentTime = 0;
    s.play().catch(()=>{});
}

/* =========================
   UI SOUND EVENTS
========================= */
function hover(){
    startAudio();
    play(hoverS);
}

function openLink(url){
    startAudio();
    play(clickS);
    setTimeout(()=>window.open(url,"_blank"),150);
}

function goPortfolio(){
    startAudio();
    play(portfolioS);
    setTimeout(()=>location.href="portfolio.html",700);
}

</script>

</body>
</html>
