<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: 'Titan One', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    overflow: hidden;
    position: relative;

    cursor: url("cursor.png"), auto;
}

/* patrón */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    pointer-events: none;

    animation: movePattern 20s linear infinite;
}

@keyframes movePattern {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
}

h1 {
    font-size: 60px;
}

/* BIG detrás */
.tdog-wrap {
    position: relative;
    display: inline-block;
}

.tdog-wrap img {
    position: absolute;
    top: -150px;
    left: 65%;
    width: 320px;
    transform: translateX(-50%);
    z-index: -1;
    pointer-events: none;
}

/* BOTONES */
.buttons {
    display: flex;
    gap: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("cursor.png"), auto;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* ✔ COLORES CORRECTOS */
.github { background: #2b2f36; color: white; }
.youtube { background: #ff0000; color: white; }
.portfolio { background: #ffd400; color: black; }
.x { background: #000000; color: white; }
</style>
</head>

<body>

<div class="container">

<h1>
    I'm El Pana 
    <span class="tdog-wrap">
        <img src="big.png">
        Hot Dog
    </span>
</h1>

<div class="buttons">
    <button class="github" onmouseenter="hover()" onclick="clickNormal('https://github.com')">GitHub</button>
    <button class="youtube" onmouseenter="hover()" onclick="clickNormal('https://youtube.com')">YouTube</button>
    <button class="portfolio" onmouseenter="hover()" onclick="clickPortfolio()">Portfolio</button>
    <button class="x" onmouseenter="hover()" onclick="clickNormal('https://x.com')">X</button>
</div>

</div>

<!-- AUDIO -->
<audio id="hoverSound" src="PopUp.wav"></audio>
<audio id="clickSound" src="Accept.wav"></audio>
<audio id="portfolioSound" src="Confeti.wav"></audio>
<audio id="bgMusic" src="FallinFriends.mp3" loop></audio>

<script>
const hoverSound = document.getElementById("hoverSound");
const clickSound = document.getElementById("clickSound");
const portfolioSound = document.getElementById("portfolioSound");
const bgMusic = document.getElementById("bgMusic");

let musicStarted = false;

function play(a){
    a.currentTime = 0;
    a.play().catch(()=>{});
}

function startMusic(){
    if(!musicStarted){
        bgMusic.volume = 0.15;
        bgMusic.play().catch(()=>{});
        musicStarted = true;
    }
}

function hover(){
    startMusic();
    play(hoverSound);
}

function clickNormal(url){
    startMusic();
    play(clickSound);
    setTimeout(()=>window.open(url,"_blank"),150);
}

function clickPortfolio(){
    startMusic();
    play(portfolioSound);
    setTimeout(()=>window.location.href="portfolio.html",200);
}
</script>

</body>
</html>
