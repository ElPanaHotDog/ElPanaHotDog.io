<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: 'Titan One', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);

    cursor: url("cursor.png"), auto;
    position: relative;
}

/* 🌫 PATRÓN (FONDO) */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;

    animation: move 20s linear infinite;

    z-index: 1;
    pointer-events: none;
}

@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

/* 🖼 BIG (ENTRE PATRÓN Y UI) */
.big-layer {
    position: absolute;

    top: 40%;
    left: 62%; /* 🔥 ajustado a la derecha */
    transform: translate(-50%, -50%);

    width: 320px;

    z-index: 2;
    pointer-events: none;
}

/* 🧠 UI */
.ui {
    position: relative;
    z-index: 3;
    text-align: center;
}

h1 {
    font-size: 60px;
}

/* BOTONES */
.buttons {
    display: flex;
    gap: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("cursor.png"), auto;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* 🎨 COLORES */
.github { background: #2b2f36; color: white; }
.youtube { background: #ff0000; color: white; }
.portfolio { background: #ffd400; color: black; }
.x { background: #000000; color: white; }
</style>
</head>

<body>

<!-- 🖼 BIG -->
<img class="big-layer" src="big.png">

<!-- UI -->
<div class="ui">

<h1>I'm El Pana Hot Dog</h1>

<div class="buttons">
    <button class="github" onmouseenter="hover()" onclick="openLink('https://github.com/ElPanaHotDog')">GitHub</button>
    <button class="youtube" onmouseenter="hover()" onclick="openLink('https://www.youtube.com/@ElPanaHotDog')">YouTube</button>
    <button class="portfolio" onmouseenter="hover()" onclick="goPortfolio()">Portfolio</button>
    <button class="x" onmouseenter="hover()" onclick="openLink('https://x.com/ElPanaHotDog')">X</button>
</div>

</div>

<!-- 🔊 AUDIO -->
<audio id="music" src="FallinFriends.mp3" loop></audio>
<audio id="hoverS" src="PopUp.wav"></audio>
<audio id="clickS" src="Accept.wav"></audio>
<audio id="portfolioS" src="Confeti.wav"></audio>

<script>

const music = document.getElementById("music");
const hoverS = document.getElementById("hoverS");
const clickS = document.getElementById("clickS");
const portfolioS = document.getElementById("portfolioS");

let unlocked = false;

/* 🔊 AUDIO FIX REAL */
function unlockAudio(){
    if(unlocked) return;

    unlocked = true;

    music.volume = 0.12;

    music.play().catch(()=>{});

    // segundo intento por compatibilidad
    setTimeout(()=>music.play().catch(()=>{}), 50);
}

/* desbloqueo global (obligatorio por navegador) */
window.addEventListener("click", unlockAudio);
window.addEventListener("mousemove", unlockAudio);
window.addEventListener("keydown", unlockAudio);

/* 🔊 SFX */
function play(s){
    if(!s) return;
    s.currentTime = 0;
    s.play().catch(()=>{});
}

function hover(){
    unlockAudio();
    play(hoverS);
}

function openLink(url){
    unlockAudio();
    play(clickS);
    setTimeout(()=>window.open(url,"_blank"),150);
}

function goPortfolio(){
    unlockAudio();
    play(portfolioS);
    setTimeout(()=>location.href="portfolio.html",700);
}

</script>

</body>
</html>
