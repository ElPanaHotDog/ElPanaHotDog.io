<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    font-family:'Titan One', sans-serif;
    color:white;

    background: linear-gradient(to bottom,#a056ff,#a098ff);
    overflow:hidden;
    cursor:url("cursor.png"), auto;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:url("S12_Pattern.png");
    background-repeat:repeat;
    background-size:200px;
    opacity:0.15;
    animation:move 20s linear infinite;
    pointer-events:none;
}

@keyframes move{
    from{background-position:0 0;}
    to{background-position:400px 400px;}
}

h1{font-size:60px;}

.tdog-wrap{
    position:relative;
    display:inline-block;
}

.tdog-wrap img{
    position:absolute;
    top:-150px;
    left:65%;
    width:320px;
    transform:translateX(-50%);
    z-index:-1;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    font-family:'Asap', sans-serif;
    font-weight:700;
    font-size:18px;
    cursor:url("cursor.png"), auto;
    transition:.2s;
}

button:hover{transform:scale(1.1);}

/* ✔ COLORES CORRECTOS */
.github{background:#2b2f36;color:white;}
.youtube{background:#ff0000;color:white;}
.portfolio{background:#ffd400;color:black;}
.x{background:#000000;color:white;}
</style>
</head>

<body>

<h1>
    I'm El Pana
    <span class="tdog-wrap">
        <img src="big.png">
        Hot Dog
    </span>
</h1>

<div class="buttons">
    <button onmouseenter="hover()" onclick="openGH()">GitHub</button>
    <button onmouseenter="hover()" onclick="openYT()">YouTube</button>
    <button onmouseenter="hover()" onclick="openPF()">Portfolio</button>
    <button onmouseenter="hover()" onclick="openX()">X</button>
</div>

<audio id="bg" src="FallinFriends.mp3" loop></audio>
<audio id="hover" src="PopUp.wav"></audio>
<audio id="click" src="Accept.wav"></audio>
<audio id="conf" src="Confeti.wav"></audio>

<script>
const bg=document.getElementById("bg");
const hoverS=document.getElementById("hover");
const clickS=document.getElementById("click");
const confS=document.getElementById("conf");

let started=false;

function startMusic(){
    if(!started){
        bg.volume=0.15;
        bg.play().catch(()=>{});
        started=true;
    }
}

document.addEventListener("click",startMusic);
document.addEventListener("mousemove",startMusic);

function play(a){
    a.currentTime=0;
    a.play().catch(()=>{});
}

function hover(){
    startMusic();
    play(hoverS);
}

function openGH(){startMusic();play(clickS);window.open("https://github.com");}
function openYT(){startMusic();play(clickS);window.open("https://youtube.com");}

function openPF(){
    startMusic();
    play(confS);
    setTimeout(()=>location.href="portfolio.html",700);
}

function openX(){startMusic();play(clickS);window.open("https://x.com");}
</script>

</body>
</html>
