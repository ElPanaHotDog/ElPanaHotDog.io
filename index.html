<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: 'Titan One', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    overflow: hidden;
    position: relative;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
}

/* patrón */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

/* HOT DOG BIG (más grande) */
.tdog-wrap {
    position: relative;
    display: inline-block;
}

.tdog-wrap img {
    position: absolute;

    top: -150px;
    left: 65%;

    width: 320px;
    height: auto;

    transform: translateX(-50%);
    z-index: 0;
    pointer-events: none;
}

.tdog {
    position: relative;
    z-index: 1;
}

/* BOTONES */
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    position: relative;
}

/* cursor también en botones */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;

    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* colores */
.github { background: #24292e; color: white; }
.youtube { background: #ff0000; color: white; }
.x { background: #000000; color: white; }
.portfolio { background: #ffd400; color: black; font-weight: 900; }
</style>
</head>

<body>

<div class="container">

    <h1>
        I'm El Pana 
        <span class="tdog-wrap">
            <img src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/big.png">
            <span class="tdog">Hot Dog</span>
        </span>
    </h1>

    <div class="buttons">
        <button class="github" onclick="window.open('https://github.com/ElPanaHotDog','_blank')">GitHub</button>

        <button class="youtube" onclick="window.open('https://youtube.com','_blank')">YouTube</button>

        <button class="portfolio" onclick="window.location.href='portfolio.html'">
            Portfolio
        </button>

        <button class="x" onclick="window.open('https://x.com','_blank')">X</button>
    </div>

</div>

</body>
</html>
