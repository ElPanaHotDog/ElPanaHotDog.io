<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Asap:wght@700&display=swap" rel="stylesheet">

<title>El Pana Hot Dog</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: 'Titan One', sans-serif;
    color: white;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    overflow: hidden;
    position: relative;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
}

/* patrón animado */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    pointer-events: none;

    animation: movePattern 20s linear infinite;
}

@keyframes movePattern {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

/* UI */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
}

/* BIG DETRÁS */
.tdog-wrap {
    position: relative;
    display: inline-block;
}

.tdog-wrap img {
    position: absolute;
    top: -150px;
    left: 65%;
    width: 320px;
    transform: translateX(-50%);
    z-index: -1;
    pointer-events: none;
}

/* BOTONES */
.buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;

    font-family: 'Asap', sans-serif;
    font-weight: 700;
    font-size: 18px;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;

    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

.github { background: #24292e; color: white; }
.youtube { background: #ff0000; color: white; }
.x { background: #000000; color: white; }
.portfolio { background: #ffd400; color: black; }
</style>
</head>

<body>

<div class="container">

    <h1>
        I'm El Pana 
        <span class="tdog-wrap">
            <img src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/big.png">
            <span class="tdog">Hot Dog</span>
        </span>
    </h1>

    <div class="buttons">
        <button class="github" onmouseenter="hover()" onclick="clickNormal('https://github.com/ElPanaHotDog')">GitHub</button>
        <button class="youtube" onmouseenter="hover()" onclick="clickNormal('https://youtube.com')">YouTube</button>
        <button class="portfolio" onmouseenter="hover()" onclick="clickPortfolio()">Portfolio</button>
        <button class="x" onmouseenter="hover()" onclick="clickNormal('https://x.com')">X</button>
    </div>

</div>

<!-- AUDIO -->
<audio id="hoverSound" src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/BNK_UI_MainMenu#65 (UI_Gen_PopUp).wav"></audio>
<audio id="clickSound" src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/BNK_UI_MainMenu#3 (UI_MainMenu_Custo_Accept).wav"></audio>
<audio id="portfolioSound" src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/BNK_UI_MainMenu#55 (SFX_SymphonyRewards_Confeti).wav"></audio>

<script>
const hoverSound = document.getElementById("hoverSound");
const clickSound = document.getElementById("clickSound");
const portfolioSound = document.getElementById("portfolioSound");

function hover() {
    hoverSound.currentTime = 0;
    hoverSound.play();
}

function clickNormal(url) {
    clickSound.currentTime = 0;
    clickSound.play();
    setTimeout(() => window.open(url, "_blank"), 150);
}

function clickPortfolio() {
    portfolioSound.currentTime = 0;
    portfolioSound.play();
    setTimeout(() => window.location.href = "portfolio.html", 200);
}
</script>

</body>
</html>
