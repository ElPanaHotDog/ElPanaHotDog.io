<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    font-family: 'Titan One', sans-serif;

    cursor: url("cursor.png"), auto;
}

/* patrón */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
    pointer-events: none;

    animation: movePattern 20s linear infinite;
}

@keyframes movePattern {
    from { background-position: 0 0; }
    to { background-position: 400px 400px; }
}

/* container */
.container {
    position: relative;
    width: 100%;
    height: 100%;
}

/* slides */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    transition: transform 0.6s ease;
}

.center { transform: translateX(0); }
.left { transform: translateX(-100%); }
.right { transform: translateX(100%); }

/* texto */
.title { font-size: 32px; }
.desc { color: white; text-align: center; max-width: 500px; }

/* media */
video { width: 720px; border-radius: 18px; }
img { width: 600px; border-radius: 18px; }

/* FLECHAS FIX */
.arrow {
    position: absolute;
    width: 80px;
    height: 80px;

    background-image: url("UI_NavigationArrow_Outline.png");
    background-size: contain;
    background-repeat: no-repeat;

    cursor: url("cursor.png"), auto;

    transition: transform 0.15s ease, filter 0.15s ease;
}

/* izquierda */
.arrow.left {
    left: 15%;
    top: 50%;
    transform: translateY(-50%);
}

.arrow.left:hover {
    transform: translateY(-50%) scale(1.2);
    filter: drop-shadow(0 0 10px white);
}

.arrow.left:active {
    transform: translateY(-50%) scale(0.95);
}

/* derecha FIX SIN BUG */
.arrow.right {
    right: 15%;
    top: 50%;
    transform: translateY(-50%);
}

.arrow.right::after {
    content: "";
    position: absolute;
    width: 80px;
    height: 80px;
    background-image: url("UI_NavigationArrow_Outline.png");
    background-size: contain;
    background-repeat: no-repeat;
    transform: scaleX(-1);
}

.arrow.right:hover {
    transform: translateY(-50%) scale(1.2);
    filter: drop-shadow(0 0 10px white);
}

.arrow.right:active {
    transform: translateY(-50%) scale(0.95);
}
</style>
</head>

<body>

<div class="container">

    <div class="slide center" id="s0">
        <div class="title">Space Circuit</div>
        <div class="desc">A map with space theme that took 3 weeks to complete</div>
        <video controls src="SpaceCircuit.mp4"></video>
    </div>

    <div class="slide right" id="s1">
        <div class="title">Render</div>
        <div class="desc">Blender render for thumbnail</div>
        <img src="Render.png">
    </div>

    <div class="slide right" id="s2">
        <div class="title">Jabirds Skin</div>
        <div class="desc">Skin for Hispanic YouTuber</div>
        <img src="JabirdsSkin.jpg">
    </div>

</div>

<div class="arrow left" onmouseenter="hover()" onclick="move(-1)"></div>
<div class="arrow right" onmouseenter="hover()" onclick="move(1)"></div>

<!-- AUDIO -->
<audio id="hoverSound" src="PopUp.wav"></audio>
<audio id="clickSound" src="Accept.wav"></audio>
<audio id="bgMusic" src="FallinFriends.mp3" loop></audio>

<script>
let index = 0;

const slides = [...document.querySelectorAll(".slide")];

const hoverSound = document.getElementById("hoverSound");
const clickSound = document.getElementById("clickSound");
const bgMusic = document.getElementById("bgMusic");

let started = false;

function play(a){
    a.currentTime = 0;
    a.play().catch(()=>{});
}

function startMusic(){
    if(!started){
        bgMusic.volume = 0.08; // 🔥 más bajo que HOME
        bgMusic.play().catch(()=>{});
        started = true;
    }
}

function hover(){
    startMusic();
    play(hoverSound);
}

function update(){
    slides.forEach((s,i)=>{
        s.classList.remove("left","center","right");
        if(i===index) s.classList.add("center");
        else if(i<index) s.classList.add("left");
        else s.classList.add("right");
    });
}

function move(dir){
    startMusic();
    play(clickSound);

    index += dir;
    if(index<0) index = slides.length-1;
    if(index>=slides.length) index = 0;

    update();
}

update();
</script>

</body>
</html>
