<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    overflow: hidden;
    position: relative;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
}

/* patrón */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
}

/* SLIDES */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

/* VIDEO MÁS GRANDE */
video {
    width: 700px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* IMAGEN render */
img.render {
    width: 600px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* flechas */
.arrow {
    position: absolute;
    width: 90px;
    height: 90px;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/UI_NavigationArrow_Outline.png");
    background-size: contain;
    background-repeat: no-repeat;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
    z-index: 10;
}

.arrow.left {
    left: 5%;
    top: 50%;
    transform: translateY(-50%);
}

.arrow.right {
    right: 5%;
    top: 50%;
    transform: translateY(-50%) scaleX(-1);
}
</style>
</head>

<body>

<!-- SLIDE 1 VIDEO -->
<div class="slide" id="slide1">
    <video controls>
        <source src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/SpaceCircuit.mp4" type="video/mp4">
    </video>
</div>

<!-- SLIDE 2 RENDER -->
<div class="slide hidden" id="slide2">
    <img class="render" src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/Render.png">
</div>

<!-- FLECHAS -->
<div class="arrow left" onclick="prevSlide()"></div>
<div class="arrow right" onclick="nextSlide()"></div>

<script>
let current = 0;

const slides = [
    document.getElementById("slide1"),
    document.getElementById("slide2")
];

function showSlide(index) {
    slides.forEach((s, i) => {
        if (i === index) {
            s.classList.remove("hidden");
        } else {
            s.classList.add("hidden");
        }
    });
}

function nextSlide() {
    current = (current + 1) % slides.length;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
}
</script>

</body>
</html>
