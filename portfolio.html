<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

<title>Portfolio</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(to bottom,#a056ff,#a098ff);
    font-family:'Titan One';
    cursor:url("cursor.png"),auto;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:url("S12_Pattern.png");
    background-repeat:repeat;
    background-size:200px;
    opacity:0.15;
    animation:move 20s linear infinite;
    pointer-events:none;
}

@keyframes move{
    from{background-position:0 0;}
    to{background-position:400px 400px;}
}

.container{
    position:relative;
    width:100%;
    height:100%;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    transition:transform .5s ease, opacity .5s ease;
    opacity:0;
    transform:translateX(100%);
}

.slide.active{
    opacity:1;
    transform:translateX(0);
}

.slide.left{
    transform:translateX(-100%);
}

.title{font-size:32px;}
.desc{color:white;text-align:center;max-width:500px;}

video{width:720px;border-radius:18px;}
img{width:600px;border-radius:18px;}

/* FLECHAS NUEVAS LIMPIAS */
.arrow{
    position:absolute;
    top:50%;
    width:80px;
    height:80px;
    background-image:url("UI_NavigationArrow_Outline.png");
    background-size:contain;
    background-repeat:no-repeat;
    transform:translateY(-50%);
    cursor:pointer;
    transition:.2s;
}

.arrow:hover{
    transform:translateY(-50%) scale(1.2);
    filter:drop-shadow(0 0 10px white);
}

.left{left:15%;}
.right{right:15%; transform:translateY(-50%) scaleX(-1);}
.right:hover{transform:translateY(-50%) scaleX(-1) scale(1.2);}
</style>
</head>

<body>

<div class="container">

<div class="slide active">
    <div class="title">Space Circuit</div>
    <div class="desc">A map with space theme that took 3 weeks</div>
    <video src="SpaceCircuit.mp4" controls></video>
</div>

<div class="slide">
    <div class="title">Render</div>
    <div class="desc">Blender thumbnail render</div>
    <img src="Render.png">
</div>

<div class="slide">
    <div class="title">Jabirds Skin</div>
    <div class="desc">Skin for Hispanic YouTuber</div>
    <img src="JabirdsSkin.jpg">
</div>

</div>

<div class="arrow left" onclick="move(-1)"></div>
<div class="arrow right" onclick="move(1)"></div>

<audio id="bg" src="FallinFriends.mp3" loop></audio>
<audio id="hover" src="PopUp.wav"></audio>
<audio id="click" src="Accept.wav"></audio>

<script>
const slides=[...document.querySelectorAll(".slide")];
let i=0;

const bg=document.getElementById("bg");
const hoverS=document.getElementById("hover");
const clickS=document.getElementById("click");

let started=false;

function startMusic(){
    if(!started){
        bg.volume=0.07;
        bg.play().catch(()=>{});
        started=true;
    }
}

document.addEventListener("click",startMusic);

function play(a){
    a.currentTime=0;
    a.play().catch(()=>{});
}

function update(){
    slides.forEach((s,idx)=>{
        s.classList.remove("active","left");
        if(idx===i) s.classList.add("active");
        else if(idx<i) s.classList.add("left");
    });
}

function move(dir){
    startMusic();
    play(clickS);

    i+=dir;
    if(i<0)i=slides.length-1;
    if(i>=slides.length)i=0;

    update();
}

update();
</script>

</body>
</html>
