<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(to bottom, #a056ff, #a098ff);
    font-family: 'Titan One', sans-serif;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
}

/* patrón */
body::before {
    content: "";
    position: absolute;
    inset: 0;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/S12_Pattern.png");
    background-repeat: repeat;
    background-size: 200px;

    opacity: 0.15;
}

/* CONTENEDOR SLIDES */
.container {
    position: relative;
    width: 100%;
    height: 100%;
}

/* SLIDES */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    transition: transform 0.6s ease;
}

/* posiciones */
.center { transform: translateX(0); }
.left { transform: translateX(-100%); }
.right { transform: translateX(100%); }

/* VIDEO */
video {
    width: 720px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

img.render {
    width: 600px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* TEXTO */
.title {
    font-size: 32px;
    margin-top: 15px;
}

.desc {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 10px;
    text-align: center;
    max-width: 500px;
}

/* FLECHAS MÁS CERCA */
.arrow {
    position: absolute;
    width: 80px;
    height: 80px;

    background-image: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/UI_NavigationArrow_Outline.png");
    background-size: contain;
    background-repeat: no-repeat;

    cursor: url("https://ElPanaHotDog.github.io/ElPanaHotDog.io/cursor.png"), auto;
    z-index: 10;
}

.arrow.left {
    left: 15%;
    top: 50%;
    transform: translateY(-50%);
}

.arrow.right {
    right: 15%;
    top: 50%;
    transform: translateY(-50%) scaleX(-1);
}
</style>
</head>

<body>

<div class="container">

    <!-- SLIDE 1 -->
    <div class="slide center" id="slide1">
        <div style="text-align:center;">
            <div class="title">Space Circuit</div>
            <div class="desc">A map with space theme that took 3 weeks to complete</div>

            <video controls>
                <source src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/SpaceCircuit.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- SLIDE 2 -->
    <div class="slide right" id="slide2">
        <div style="text-align:center;">
            <div class="title">Render for a YouTuber's Thumbnail</div>
            <div class="desc">This is a space themed render made in Blender, created for a YouTuber's thumbnail</div>

            <img class="render" src="https://ElPanaHotDog.github.io/ElPanaHotDog.io/Render.png">
        </div>
    </div>

</div>

<!-- FLECHAS -->
<div class="arrow left" onclick="moveLeft()"></div>
<div class="arrow right" onclick="moveRight()"></div>

<script>
let index = 0;

const slides = [
    document.getElementById("slide1"),
    document.getElementById("slide2")
];

function update() {
    slides.forEach((s, i) => {
        s.classList.remove("left", "center", "right");

        if (i === index) s.classList.add("center");
        else if (i < index) s.classList.add("left");
        else s.classList.add("right");
    });
}

function moveRight() {
    index = (index + 1) % slides.length;
    update();
}

function moveLeft() {
    index = (index - 1 + slides.length) % slides.length;
    update();
}

update();
</script>

</body>
</html>
